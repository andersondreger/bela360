# ===========================================
# bela360 - Production Docker Compose
# ===========================================
# Usage: docker compose -f docker-compose.prod.yml up -d --build
# Roteamento/SSL: Traefik compartilhado da VPS (container "traefik", rede default deste projeto
# precisa ser conectada a ele: docker network connect bela360_default traefik)

name: bela360

services:
  # ===========================================
  # PostgreSQL Database (fallback local - trocar DATABASE_URL para Supabase quando disponivel)
  # ===========================================
  postgres:
    image: postgres:15-alpine
    container_name: bela360-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      traefik.enable: "false"
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================
  # Redis
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: bela360-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    labels:
      traefik.enable: "false"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ===========================================
  # Backend API
  # ===========================================
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      target: production
    container_name: bela360-api
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - API_URL=${API_URL}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
      - FRONTEND_URL=${FRONTEND_URL}
      - SENTRY_DSN=${SENTRY_DSN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      traefik.enable: "true"
      traefik.http.routers.bela360-api.rule: Host(`bela360.wayia.com.br`) && PathPrefix(`/api`)
      traefik.http.routers.bela360-api.entrypoints: web,websecure
      traefik.http.routers.bela360-api.tls: "true"
      traefik.http.routers.bela360-api.tls.certresolver: leresolver
      traefik.http.routers.bela360-api.priority: "100"
      traefik.http.services.bela360-api.loadbalancer.server.port: "3001"
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================
  # Frontend Web
  # ===========================================
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      target: production
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    container_name: bela360-web
    restart: always
    environment:
      - NODE_ENV=production
    depends_on:
      - api
    labels:
      traefik.enable: "true"
      traefik.http.routers.bela360-web.rule: Host(`bela360.wayia.com.br`)
      traefik.http.routers.bela360-web.entrypoints: web,websecure
      traefik.http.routers.bela360-web.tls: "true"
      traefik.http.routers.bela360-web.tls.certresolver: leresolver
      traefik.http.services.bela360-web.loadbalancer.server.port: "3000"
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
  redis_data:
