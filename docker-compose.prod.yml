# ===========================================
# bela360 - Production Docker Compose
# ===========================================
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  # ===========================================
  # Redis
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: bela360-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bela360-network
    deploy:
      resources:
        limits:
          memory: 256M

  # ===========================================
  # Backend API
  # ===========================================
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      target: production
    container_name: bela360-api
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - API_URL=${API_URL}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
      - FRONTEND_URL=${FRONTEND_URL}
      - SENTRY_DSN=${SENTRY_DSN}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bela360-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================
  # Frontend Web
  # ===========================================
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      target: production
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    container_name: bela360-web
    restart: always
    environment:
      - NODE_ENV=production
    depends_on:
      - api
    networks:
      - bela360-network
    deploy:
      resources:
        limits:
          memory: 256M

  # ===========================================
  # Nginx Reverse Proxy
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: bela360-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    networks:
      - bela360-network
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  bela360-network:
    driver: bridge

volumes:
  redis_data:
  nginx_cache:
